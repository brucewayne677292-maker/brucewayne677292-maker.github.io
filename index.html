<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.KEYEZ LUXURY | Access</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #000; color: #fff; }
        .container { text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #profile-view { display: none; }
        h1 { font-weight: 300; letter-spacing: 0.2rem; }
    </style>
</head>
<body>

<div id="login-view" class="container">
    <h1>O.KEYEZ LUXURY</h1>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="saveUser()">ENTER</button>
</div>

<div id="profile-view" class="container">
    <h1>Welcome, <span id="display-name"></span></h1>
    <button onclick="logout()">LOGOUT</button>
</div>

<script>
    // Check if user is already saved
    const savedUser = localStorage.getItem('oKeyezUser');
    if (savedUser) {
        showProfile(savedUser);
    }

    function saveUser() {
        const name = document.getElementById('username').value;
        if (name) {
            localStorage.setItem('oKeyezUser', name);
            showProfile(name);
        }
    }

    function showProfile(name) {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('profile-view').style.display = 'block';
        document.getElementById('display-name').innerText = name;
    }

    function logout() {
        localStorage.removeItem('oKeyezUser');
        location.reload();
    }
</script>

</body>
</html>
