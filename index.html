<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.KEYEZ LUXURY | PORTAL</title>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .container { width: 90%; max-width: 320px; text-align: center; }
        h1 { font-weight: 300; letter-spacing: 0.2rem; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; cursor: pointer; font-weight: 600; margin-top: 10px; }
        .toggle-btn { background: transparent; color: #888; border: 1px solid #333; margin-top: 15px; font-size: 0.8rem; }
        #profile-view { display: none; }
        #message { color: #ff4444; font-size: 0.8rem; margin: 10px 0; min-height: 1.2rem; }
    </style>
</head>
<body>

<div id="auth-view" class="container">
    <h1 id="title">LOGIN</h1>
    <input type="text" id="username" placeholder="USERNAME">
    <input type="password" id="password" placeholder="PASSCODE">
    <div id="message"></div>
    <button id="action-btn" onclick="handleAuth()">SIGN IN</button>
    <button class="toggle-btn" onclick="toggleMode()" id="toggle-text">Need an account? Create one</button>
</div>

<div id="profile-view" class="container">
    <h1>WELCOME, <span id="display-name"></span></h1>
    <button onclick="logout()">LOGOUT</button>
</div>

<script>
    let isLoginMode = true;

    // Check if user is already logged in
    const activeUser = localStorage.getItem('oKeyezActiveUser');
    if (activeUser) showProfile(activeUser);

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "LOGIN" : "CREATE ACCOUNT";
        document.getElementById('action-btn').innerText = isLoginMode ? "SIGN IN" : "REGISTER";
        document.getElementById('toggle-text').innerText = isLoginMode ? "Need an account? Create one" : "Back to Login";
        document.getElementById('message').innerText = "";
    }

    function handleAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const users = JSON.parse(localStorage.getItem('oKeyezUsers') || '{}');
        const msg = document.getElementById('message');

        if (!user || !pass) { msg.innerText = "Please fill all fields."; return; }

        if (isLoginMode) {
            // Login Logic
            if (!users[user]) {
                msg.innerText = "Account does not exist.";
            } else if (users[user] !== pass) {
                msg.innerText = "Incorrect passcode.";
            } else {
                localStorage.setItem('oKeyezActiveUser', user);
                showProfile(user);
            }
        } else {
            // Registration Logic
            if (users[user]) {
                msg.innerText = "Account already exists.";
            } else {
                users[user] = pass;
                localStorage.setItem('oKeyezUsers', JSON.stringify(users));
                msg.style.color = "#44ff44";
                msg.innerText = "Account created! Please sign in.";
                toggleMode();
            }
        }
    }

    function showProfile(name) {
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('profile-view').style.display = 'block';
        document.getElementById('display-name').innerText = name.toUpperCase();
    }

    function logout() {
        localStorage.removeItem('oKeyezActiveUser');
        location.reload();
    }
</script>

</body>
</html>
