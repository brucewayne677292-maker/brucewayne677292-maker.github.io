<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.KEYEZ LUXURY | LOGIN</title>
    <style>
        :root { --accent: #fff; --bg: #000; --input-bg: #1a1a1a; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--accent); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .wrapper { width: 100%; max-width: 350px; padding: 20px; }
        h1 { text-align: center; font-weight: 300; letter-spacing: 2px; margin-bottom: 40px; }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; background: var(--input-bg); border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .toggle-btn { text-align: center; margin-top: 20px; font-size: 14px; color: #888; cursor: pointer; }
        #message { text-align: center; color: #ff4444; font-size: 13px; margin-bottom: 10px; min-height: 20px; }
        #profile-view { display: none; text-align: center; }
        .eye-icon { position: absolute; right: 15px; top: 15px; cursor: pointer; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="wrapper" id="auth-view">
    <h1 id="title">LOGIN</h1>
    <div id="message"></div>
    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Passcode" id="pass-field">
        <span class="eye-icon" onclick="togglePass()">SHOW</span>
    </div>
    <button class="btn" id="action-btn" onclick="handleAuth()">Sign In</button>
    <div class="toggle-btn" id="toggle-text" onclick="toggleMode()">Don't have an account? Sign up</div>
</div>

<div class="wrapper" id="profile-view">
    <h1>WELCOME, <span id="display-name"></span></h1>
    <button class="btn" onclick="logout()">LOGOUT</button>
</div>

<script>
    let isLoginMode = true;
    const users = JSON.parse(localStorage.getItem('oKeyezUsers') || '{}');

    // Init session check
    const active = localStorage.getItem('oKeyezActiveUser');
    if (active) showProfile(active);

    function toggleMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('title').innerText = isLoginMode ? "LOGIN" : "SIGN UP";
        document.getElementById('action-btn').innerText = isLoginMode ? "Sign In" : "Register";
        document.getElementById('toggle-text').innerText = isLoginMode ? "Don't have an account? Sign up" : "Already have an account? Login";
        document.getElementById('message').innerText = "";
    }

    function togglePass() {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    function handleAuth() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        const msg = document.getElementById('message');

        if (!u || !p) { msg.innerText = "Please fill in all fields."; return; }

        if (isLoginMode) {
            if (!users[u]) { msg.innerText = "Account not found."; }
            else if (users[u] !== p) { msg.innerText = "Incorrect passcode."; }
            else { localStorage.setItem('oKeyezActiveUser', u); showProfile(u); }
        } else {
            if (users[u]) { msg.innerText = "Username taken."; }
            else { users[u] = p; localStorage.setItem('oKeyezUsers', JSON.stringify(users)); msg.style.color = "#44ff44"; msg.innerText = "Account created!"; setTimeout(toggleMode, 1000); }
        }
    }

    function showProfile(name) {
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('profile-view').style.display = 'block';
        document.getElementById('display-name').innerText = name.toUpperCase();
    }

    function logout() {
        localStorage.removeItem('oKeyezActiveUser');
        location.reload();
    }
</script>
</body>
</html>
