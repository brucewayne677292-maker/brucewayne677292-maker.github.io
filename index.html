<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.KEYEZ | MESSENGER</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; height: 100vh; display: flex; }
        
        /* Sidebar */
        .sidebar { width: 300px; border-right: 1px solid #222; padding: 20px; }
        .user-card { padding: 15px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        /* Follow Button Style */
        .follow-btn { background: transparent; border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        .follow-btn.following { background: #fff; color: #000; border-color: #fff; }

        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; border-bottom: 1px solid #222; font-weight: 600; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; }
        .msg { margin-bottom: 15px; }
        .msg span { background: #1a1a1a; padding: 10px 15px; border-radius: 20px; display: inline-block; }
        
        /* Input */
        .input-area { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 20px; outline: none; }
        button { padding: 10px 20px; background: #fff; color: #000; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>O.KEYEZ LUXURY</h3>
    
    <!-- User List -->
    <div class="user-card">
        <span>Mercy</span>
        <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
    </div>
    <div class="user-card">
        <span>Kingsley</span>
        <button class="follow-btn" onclick="toggleFollow(this)">Follow</button>
    </div>
</div>

<div class="chat-area">
    <div class="chat-header">MESSAGES</div>
    <div class="messages" id="chat-box">
        <div class="msg"><span>Welcome to the vault.</span></div>
    </div>
    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Message...">
        <button onclick="sendMsg()">SEND</button>
    </div>
</div>

<script>
    // Toggle Follow State
    function toggleFollow(btn) {
        btn.classList.toggle('following');
        btn.innerText = btn.classList.contains('following') ? 'Following' : 'Follow';
    }

    // Send Message
    function sendMsg() {
        const input = document.getElementById('msg-input');
        const box = document.getElementById('chat-box');
        if(input.value) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<span style="background: #333; float: right;">${input.value}</span>`;
            box.appendChild(div);
            input.value = '';
            box.scrollTop = box.scrollHeight;
        }
    }
</script>

</body>
</html>
