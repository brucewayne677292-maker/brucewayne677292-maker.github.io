<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.KEYEZ LUXURY | ACCESS</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        .container { 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
        }
        h1 { font-weight: 300; letter-spacing: 0.2rem; margin-bottom: 30px; }
        input { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            background: #111; 
            border: 1px solid #333; 
            color: white; 
            border-radius: 0; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #fff; 
            color: #000; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            letter-spacing: 0.1rem;
            margin-top: 10px; 
        }
        #profile-view { display: none; }
    </style>
</head>
<body>

<div id="login-view" class="container">
    <h1>O.KEYEZ LUXURY</h1>
    <input type="text" id="username" placeholder="NAME">
    <input type="password" id="password" placeholder="PASSCODE">
    <button onclick="login()">ENTER</button>
</div>

<div id="profile-view" class="container">
    <h1>WELCOME, <span id="display-name"></span></h1>
    <button onclick="logout()">LOGOUT</button>
</div>

<script>
    // Check if user is already saved in the browser
    const savedUser = localStorage.getItem('oKeyezUser');
    if (savedUser) {
        showProfile(savedUser);
    }

    function login() {
        const name = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        // Simple check (You can change "1234" to any password you want)
        if (name && pass) {
            localStorage.setItem('oKeyezUser', name);
            showProfile(name);
        } else {
            alert("Please enter both Name and Passcode.");
        }
    }

    function showProfile(name) {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('profile-view').style.display = 'block';
        document.getElementById('display-name').innerText = name.toUpperCase();
    }

    function logout() {
        localStorage.removeItem('oKeyezUser');
        location.reload();
    }
</script>

</body>
</html>
